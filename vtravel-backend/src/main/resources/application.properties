# ─── Server ────────────────────────────────────────────────────────────────
server.port=8080

# ─── MySQL Database ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/vtravel_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ─── Jackson ────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.date-format=yyyy-MM-dd

# ─── JWT ────────────────────────────────────────────────────────────────────
# IMPORTANT: Change this secret before deploying — must be at least 32 chars
app.jwt.secret=W@nderSoul#SecretKey!2024$Production@India
app.jwt.expiration-ms=86400000

# ─── CORS ───────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# ─── App Properties ─────────────────────────────────────────────────────────
app.name=V_Travel Agency
app.version=1.0.0
